apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "unifi-network-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  host: {{ .Values.unifi.host | quote }}
  username: {{ .Values.unifi.username | quote }}
  password: {{ .Values.unifi.password | quote }}
