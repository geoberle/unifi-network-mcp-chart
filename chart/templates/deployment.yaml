apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "unifi-network-mcp.labels" . | nindent 4 }}
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "unifi-network-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "unifi-network-mcp.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: mcp-server
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: UNIFI_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: host
            - name: UNIFI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: username
            - name: UNIFI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-credentials
                  key: password
            - name: UNIFI_PORT
              value: {{ .Values.unifi.port | quote }}
            - name: UNIFI_SITE
              value: {{ .Values.unifi.site | quote }}
            - name: UNIFI_VERIFY_SSL
              value: {{ .Values.unifi.verifySsl | quote }}
            - name: UNIFI_MCP_HTTP_ENABLED
              value: "true"
            - name: UNIFI_MCP_HTTP_TRANSPORT
              value: {{ .Values.transport | quote }}
            - name: UNIFI_MCP_PORT
              value: {{ .Values.service.port | quote }}
            - name: UNIFI_MCP_ALLOWED_HOSTS
              value: "*"
            - name: UNIFI_MCP_ENABLE_DNS_REBINDING_PROTECTION
              value: "false"
          ports:
            - name: mcp
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
